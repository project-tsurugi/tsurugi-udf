name: Tsurugi-UDF-CI

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      os:
        type: string
        default: 'ubuntu-22.04'

jobs:
  Test:
    runs-on: [self-hosted, docker]
    permissions:
      contents: write
      checks: write
    timeout-minutes: 30
    container:
      image: ghcr.io/project-tsurugi/tsurugi-ci:${{ inputs.os || 'ubuntu-22.04' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test udf-library-python
        run: |
          python -m venv /tmp/venv-udf-library
          source /tmp/venv-udf-library/bin/activate

          cd udf-library/python
          python -m pip install .[test]
          python -m pip check
          python -m pytest -v

      - name: Test udf-plugin
        run: |
          python -m venv /tmp/venv-udf-plugin
          source /tmp/venv-udf-plugin/bin/activate

          cd udf-plugin
          python -m pip install .[test]
          python -m pip check
          python -m pytest -v

      - name: Create_GitHub_Release
        if: github.repository_owner == 'project-tsurugi' && contains(github.ref, '/tags/')
        run: |
          gh release create ${TSURUGI_UDF_VERSION} --title ${TSURUGI_UDF_VERSION} --latest --repo project-tsurugi/tsurugi-udf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TSURUGI_UDF_VERSION: ${{ github.ref_name }}
